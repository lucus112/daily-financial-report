name: 财经秘书日报

on:
  schedule:
    # 北京时间 08:00 (UTC 00:00) - 早盘简报
    - cron: '0 0 * * 1-6'
    # 北京时间 17:00 (UTC 09:00) - 晚盘复盘
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: '报告类型'
        required: true
        type: choice
        options:
          - morning
          - evening
          - both

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 安装依赖
        run: pip install yfinance --quiet

      - name: 确定报告类型
        id: report
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ inputs.report_type }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "00" ]; then
              echo "type=morning" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "09" ]; then
              echo "type=evening" >> $GITHUB_OUTPUT
            else
              echo "type=both" >> $GITHUB_OUTPUT
            fi
          fi

      - name: 生成报告
        run: |
          TYPE="${{ steps.report.outputs.type }}"
          if [ "$TYPE" = "both" ]; then
            python scripts/generate_report.py morning
            python scripts/generate_report.py evening
          else
            python scripts/generate_report.py $TYPE
          fi
          echo "Generated files:"
          find docs/ -type f

      - name: 上传 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 归档到仓库（保留历史）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No new reports to archive"
          else
            git commit -m "archive: daily report [$(date +%Y-%m-%d)]"
            git push origin master
          fi
